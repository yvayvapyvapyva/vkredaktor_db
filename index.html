    <style>

html,

}

#map {

  inset: 0;
}

[class*="-copyrights-pane"],
[class*="-controls-pane"],

}

.glass-btn {

  backdrop-filter: var(--glass-blur);

}
:root { --btn: #007AFF; --text: #ffffff; --danger: #ff6b6b; --success: #34C759; --border: rgba(255,255,255,0.25); --bg-sec: rgba(10,10,12,0.6); --warn: #ffb84d; --vk-header-height: 44px; --dark-panel: linear-gradient(180deg, rgba(20,20,20,0.85), rgba(10,10,10,0.8)); --btn-txt: #ffffff; --panel-blur: blur(22px); }

        .btn-add-main { background: linear-gradient(180deg, rgba(20,20,20,0.85), rgba(10,10,10,0.8)); color: #ffffff; padding: 14px 22px; border-radius: 30px; font-weight: 700; border: 1px solid rgba(255,255,255,0.25); box-shadow: 0 10px 25px rgba(0,0,0,0.4); cursor: pointer; font-size: 16px; transition: transform 0.18s, box-shadow 0.18s, background 0.18s; width: max-content; white-space: nowrap; height: 54px; box-sizing: border-box; backdrop-filter: blur(22px) saturate(140%); -webkit-backdrop-filter: blur(22px) saturate(140%); }

        .modal-content { background: linear-gradient(180deg, rgba(25,25,30,0.9), rgba(15,15,18,0.85)); width: 100%; max-width: 500px; border-radius: 30px 30px 0 0; display: flex; flex-direction: column; max-height: 90vh; animation: slideUp 0.4s cubic-bezier(0.2, 1, 0.3, 1); position: relative; padding-bottom: env(safe-area-inset-bottom); border: 1px solid rgba(255,255,255,0.25); backdrop-filter: blur(24px) saturate(130%); -webkit-backdrop-filter: blur(24px) saturate(130%); }

        .route-item .chevron { color: #cfd3dd; font-size: 18px; }
        .selected-route-card { padding: 14px 16px; border-radius: 16px; background: linear-gradient(180deg, rgba(25,25,30,0.7), rgba(15,15,18,0.6)); border: 1px solid rgba(255,255,255,0.25); margin-bottom: 10px; }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-action { background: linear-gradient(180deg, rgba(20,20,20,0.85), rgba(10,10,10,0.8)); color: #ffffff; border: 1px solid rgba(255,255,255,0.25); border-radius: 16px; padding: 16px; font-weight: 650; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 16px; width: 100%; box-shadow: 0 12px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.2); transition: transform 0.18s, box-shadow 0.18s; }
        .btn-action:active { transform: scale(0.98); box-shadow: 0 8px 16px rgba(0,0,0,0.22), inset 0 1px 0 rgba(255,255,255,0.16); }

        .color-dropdown { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: linear-gradient(180deg, rgba(25,25,30,0.9), rgba(15,15,18,0.85)); border-radius: 30px; padding: 12px; display: none; flex-direction: column; gap: 4px; z-index: 6000; box-shadow: 0 30px 100px rgba(0,0,0,0.5); width: 90%; max-width: 400px; border: 1px solid rgba(255,255,255,0.25); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .dropdown-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 5999; display: none; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
        .color-row { display: flex; align-items: center; gap: 16px; padding: 14px; border-radius: 18px; cursor: pointer; }
        .swatch { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1); }
        .modal-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }

        #toast { position: fixed; top: calc(env(safe-area-inset-top) + var(--vk-header-height) + 10px); left: 50%; transform: translateX(-50%) translateY(-100px); background: linear-gradient(180deg, rgba(20,20,20,0.85), rgba(10,10,10,0.8)); color: #ffffff; padding: 10px 20px; border-radius: 50px; font-size: 14px; z-index: 9999; transition: 0.4s; opacity: 0; backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,0.25); font-weight: 700; }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        .sortable-point-item { background: linear-gradient(180deg, rgba(25,25,30,0.75), rgba(15,15,18,0.65)); padding: 16px; border-radius: 20px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.25); position: relative; box-sizing: border-box; width: 100%; box-shadow: 0 8px 20px rgba(0,0,0,0.4); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }

<body>

<div id="toast">Готово</div>
<div id="welcomeScreen"><div class="welcome-card"><h2 style="margin: 0 0 8px 0; font-weight:800;">Route Editor</h2><div id="userIdBadge" style="background:rgba(255,255,255,0.12);color:#d1d5db;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;display:inline-block;margin-bottom:18px;border:1px solid rgba(255,255,255,0.2)">Загрузка...</div><div style="font-size:13px; color:#c7c9d1; margin-top:6px; margin-bottom:16px;">Загрузка маршрутов из Yandex Cloud</div><div style="display:flex;align-items:center;justify-content:center;gap:8px;color:#8b8f99;font-size:14px;"><span style="width:16px;height:16px;border:2px solid #8b8f99;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;"></span>Подключение...</div></div></div>
<div id="map"></div>
<div class="top-controls" id="uiControls" style="display:none">
    <div style="display:flex;flex-direction:column;gap:8px;pointer-events:auto;align-items:flex-start;">
        <button id="listPointsBtn" class="btn-top" onclick="openPointsOrderModal()" style="visibility:hidden">
            <span id="routeLabelText">Маршрут</span>
        </button>
        <button id="layerSwitchBtn" class="btn-top btn-icon-only" onclick="toggleLayer()" style="visibility:hidden;">
            <span class="btn-icon">🗺️</span>
        </button>
    </div>
    <div class="top-right-buttons">
        <button class="btn-top btn-icon-only" onclick="openSettingsModal()">
            <span class="btn-icon">⚙️</span>
        </button>
        <button class="btn-top btn-icon-only" id="gpsModeBtn" onclick="toggleGpsMode()" style="display:none;">
            <span class="btn-icon">🌍</span>
        </button>
    </div>
</div>
<div class="bottom-center-controls" id="bottomControls">
    <button id="addMarkerBtn" class="btn-add-main" onclick="handleAddBtnClick()" style="visibility:hidden">
        <span id="addText">Добавить новую точку</span>
    </button>
</div>
<div id="floatingSave" class="floating-save"><button id="saveStateBtn" class="btn-save-glass" onclick="saveGist()">Сохранить изменения</button></div>
<div id="dropdownOverlay" class="dropdown-overlay" onclick="closeD()"></div>

function getDistanceFromLatLonInM(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
}

const initGeolocation = () => {
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(p => {
            const coords = [p.coords.latitude, p.coords.longitude];
            if (userLocPlacemark) {
                userLocPlacemark.geometry.setCoordinates(coords);
                userLocPlacemark.options.set('visible', true);
            }
            if (gpsRecordingPoint) {
                const currentCoords = p.coords;
                const dist = getDistanceFromLatLonInM(
                    lastGpsPoint.lat, lastGpsPoint.lon,
                    currentCoords.latitude, currentCoords.longitude
                );
                if (dist < GPS_MIN_DISTANCE) return;
                const pts = gpsRecordingPoint.line.geometry.getCoordinates();
                pts.push(coords);
                gpsRecordingPoint.line.geometry.setCoordinates(pts);
                gpsRecordingPoint.pts = pts.map(pt => [f6(pt[0]), f6(pt[1])]);
                lastGpsPoint = { lat: currentCoords.latitude, lon: currentCoords.longitude };
                map.setCenter(coords);
            }
        }, null, { enableHighAccuracy: true, maximumAge: 5000 });
    }
};

};

const renameActiveRoute = async () => {
    if (!curRoute) { showToast('Выберите маршрут', 'error'); return; }
    const currentName = curRoute;
    const nextNameRaw = prompt('Новое имя маршрута (разрешены: a-z, 0-9, _)', currentName);
    if (nextNameRaw === null) return;
    const nextName = nextNameRaw.trim().replace(/[^a-zA-Z0-9_]/g, '');
    if (!nextName) { showToast('Введите имя маршрута', 'error'); return; }
    if (nextName === curRoute) return;
    
    try {
        // Получаем данные текущего маршрута
        const getResult = await callYcFunction('get', { m: curRoute });
        if (getResult.error) { showToast('Ошибка загрузки данных', 'error'); return; }
        
        // Сохраняем с новым именем
        const content = getResult.data || [];
        await callYcFunction('save', { m: nextName }, content);
        
        // Удаляем старый
        await callYcFunction('delete', { m: curRoute });
        
        curRoute = nextName;
        updateVisibility();
        refreshFileList();
        showToast('Маршрут переименован', 'success');
    } catch (e) {
        console.error('Error renaming route:', e);
        showToast('Ошибка переименования', 'error');
    }
};

const deleteActiveRoute = async () => {
    if (!curRoute) return;
    if (confirm(`Удалить маршрут ${curRoute}?`)) {
        try {
            await callYcFunction('delete', { m: curRoute });
            clearRouteObjects();
            curRoute = null;
            seedHistory();
            lastSavedSnapshot = "[]";
            refreshFileList();
            showToast("Маршрут удален", 'success');
        } catch (e) {
            console.error('Error deleting route:', e);
            showToast('Ошибка удаления', 'error');
        }
    }
};
const shareActiveRoute = () => {
    if(!curRoute) return;
    const link = `https://vk.com/app54507759#m=${USER_ID}-${curRoute}`;
    const commandsList = points.sort((a, b) => a.id - b.id).map((p, i) => `${i + 1}. ${p.cmd || 'Без команды'}`).join('\n');
    const textToCopy = `🔗 Ссылка: ${link}\nНазвание: ${curRoute}\nСписок команд:\n${commandsList}`;
    navigator.clipboard.writeText(textToCopy).then(() => { showToast("Скопировано", 'success'); }).catch(() => {
        const el = document.createElement('textarea');
        el.value = textToCopy;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        showToast("Скопировано", 'success');
    });
};
const launchNavigatorWithCurrentRoute = () => { if(!curRoute) return; window.location.href = `https://vk.com/app54507759#m=${USER_ID}-${curRoute}`; };
const openSettingsModal = () => { refreshFileList(); toggleM('settingsModal'); };
const onSettingsRouteSelect = async (e) => { const val = e.target.value || ''; if (!val || val === curRoute) return; await loadRoute(val); };
const toggleM = id => { const m = $(id); m.style.display = (m.style.display === 'none' || !m.style.display) ? 'flex' : 'none'; };
const closeD = () => { document.querySelectorAll('.color-dropdown').forEach(dr => dr.style.display = 'none'); $('dropdownOverlay').style.display = 'none'; };
const toggleD = id => { const d = $(id), vis = d.style.display === 'flex'; closeD(); if(!vis) { d.style.display = 'flex'; $('dropdownOverlay').style.display = 'block'; } };
const initColorDropdown = (id, cb) => Object.entries(COLORS).forEach(([n, d]) => { const r = Object.assign(document.createElement('div'), { className: 'color-row', onclick: (e) => { e.stopPropagation(); cb(d.hex, n); closeD(); }, innerHTML: `<div class="swatch" style="background:${d.hex}"></div><div style="font-weight:600;">${d.label}</div>` }); $(id).appendChild(r); });
const updateCommandOptions = (sel, col, val = "") => { sel.innerHTML = ''; (COMMAND_SETS[col] || ["Без команды"]).forEach(cmd => sel.appendChild(Object.assign(document.createElement('option'), { value: cmd, text: cmd, selected: cmd === val }))); };

function addP(coords, data = null, silent = false) {
    const p = { id: data?.id || (points.length + 1), color: data?.color || 'Gold', cmd: data?.cmd || '', comm: data?.comm || '', pts: data?.pts || [coords], pm: new ymaps.Placemark(coords, {}, { iconLayout: 'default#imageWithContent', iconImageSize: [40,40], iconImageOffset: [-20,-20], zIndex: 1000 }), line: new ymaps.Polyline(data?.pts || [coords], {}, { strokeWidth: 3, strokeOpacity: 0.8, zIndex: 500 }), pmEnd: null };
    p.line.options.set('strokeColor', COLORS[p.color].hex);
    p.pm.geometry.events.add('change', () => { const nc = p.pm.geometry.getCoordinates(), pts = p.line.geometry.getCoordinates(); if(pts.length) { pts[0] = nc; p.line.geometry.setCoordinates(pts); } });
    p.line.geometry.events.add('change', () => {
        p.pts = p.line.geometry.getCoordinates().map(pt => [f6(pt[0]), f6(pt[1])]);
        if(isDrawing && p.pts.length > 1) { $('addText').textContent = "Завершить рисование пути"; }
        updI(p);
        if (p.pts.length > 1) updPI(p);
    });
    p.pm.events.add('click', () => { setActivePoint(p, true); if(!isAdd && !isDrawing) openEditPointModal(p); });
    map.geoObjects.add(p.pm);
    map.geoObjects.add(p.line);
    points.push(p);
    updI(p);
    if (p.pts.length > 1) updPI(p);
    if (!silent) updateSaveState();
    return p;
}

const startDrawingForPoint = (p, isNewPoint = false) => {
    isAdd = false;
    isDrawing = true;
    $('addText').textContent = "Рисуйте путь...";
    $('addMarkerBtn').classList.remove('active');
    $('addMarkerBtn').classList.add('drawing');
    cur = p;
    setActivePoint(p, !isNewPoint);
    p.line.editor.startDrawing();
    p.pm.options.set('draggable', true);
};
const stopDrawingMode = () => {
    if (cur) {
        cur.pm.options.set('draggable', false);
        cur.line.editor.stopEditing();
        pushHistorySnapshot();
        updateSaveState();
    }
    isDrawing = false;
    $('addText').textContent = "Добавить новую точку";
    $('addMarkerBtn').classList.remove('drawing');
    cur = null;
};
const handleAddBtnClick = () => {
    if (gpsRecordingPoint) { stopGpsRecordMode(); }
    else if (isDrawing) { stopDrawingMode(); }
    else if (isAdd) { stopAdd(); }
    else { openCreatePointModal(); }
};

function toggleGpsMode() {
    if (gpsRecordingPoint) { stopGpsRecordMode(); }
    else {
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(
            (position) => {
                const coords = [position.coords.latitude, position.coords.longitude];
                gpsRecordingPoint = addP(coords, { id: points.length + 1, color: 'Gold', cmd: 'Выполняем разгон до максимальной скорости', comm: '', pts: [coords] }, false);
                lastGpsPoint = { lat: coords[0], lon: coords[1] };
                gpsRecordingPoint.line.editor.startDrawing();
                gpsRecordingPoint.pm.options.set('draggable', true);
                $('addText').textContent = 'Завершить запись';
                $('gpsModeBtn').classList.add('active');
            },
            (error) => { console.error('GPS error:', error); },
            { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
        );
    }
}

function stopGpsRecordMode() {
    if (gpsRecordingPoint) {
        gpsRecordingPoint.line.editor.stopEditing();
        gpsRecordingPoint.pm.options.set('draggable', false);
        gpsRecordingPoint = null;
    }
    lastGpsPoint = null;
    $('gpsModeBtn').classList.remove('active');
    $('addText').textContent = 'Добавить новую точку';
    pushHistorySnapshot();
}

const stopAdd = () => { isAdd = false; tempNewPointData = null; $('addText').textContent = "Добавить новую точку"; $('addMarkerBtn').classList.remove('active'); map.setCursor('grab'); };
const updI = p => { p.pm.options.set('iconImageHref', getSvg(COLORS[p.color].hex, p.id, (p.pts?.length >= 2 ? calcA(p.pts[0], p.pts[1]) : 0), false)); };
function updPI(p) { const pts = p.line.geometry.getCoordinates(); if(!pts.length) return; const last = pts[pts.length-1], prev = pts[pts.length-2]; if(!p.pmEnd) { p.pmEnd = new ymaps.Placemark(last, {}, { iconLayout: 'default#imageWithContent', iconImageSize: [34,34], iconImageOffset: [-17,-17], interactive: false, zIndex: 800 }); map.geoObjects.add(p.pmEnd); } else p.pmEnd.geometry.setCoordinates(last); p.pmEnd.options.set({ iconImageHref: getSvg(COLORS[p.color].hex, p.id, prev ? calcA(prev, last) : 0, true) }); }

function recalculateIds() {
    points.forEach((p, i) => { p.id = i + 1; updI(p); if(p.pmEnd) updPI(p); });
    const list = $('pointsSortList'); if (list && list.children.length === points.length) Array.from(list.children).forEach((c, i) => { const n = c.querySelector('.point-number-text'); if(n) n.textContent = i + 1; c.dataset.id = i + 1; });
    syncActiveListCard();
}

function createPointCard(p, single = false) {
    const item = document.createElement('div'); item.className = 'sortable-point-item'; item.dataset.id = p.id;
    item.innerHTML = `${!single ? '<div class="sort-handle">☰</div>' : ''}<div class="item-main-row"><div class="point-number-text">${p.id || '?'}</div><div class="color-indicator-btn" style="background:${COLORS[p.color].hex}"></div><select class="cmd-select"></select></div><textarea class="comm-input" placeholder="комментарий">${p.comm || ''}</textarea><div class="item-actions"><button class="btn-item-action btn-path">🖋️ Изменить путь</button><button class="btn-item-action btn-del" style="color:var(--danger)">🗑️ Удалить</button></div>`;
    const sel = item.querySelector('.cmd-select'); updateCommandOptions(sel, p.color, p.cmd);
    const comm = item.querySelector('.comm-input');
    const autoHeight = () => { comm.style.height = 'auto'; comm.style.height = comm.scrollHeight + 'px'; };
    comm.addEventListener('input', () => { p.comm = comm.value; autoHeight(); updateSaveState(); });
    comm.addEventListener('blur', () => { pushHistorySnapshot(); updateSaveState(); });
    setTimeout(autoHeight, 0);
    item.querySelector('.color-indicator-btn').onclick = e => { e.stopPropagation(); activeListPoint = { point: p, card: item }; toggleD('listColorDropdown'); };
    sel.onchange = () => { p.cmd = sel.value; pushHistorySnapshot(); updateSaveState(); };
    item.onclick = e => {
        if (e.target.closest('.btn-item-action') || e.target.closest('.color-indicator-btn') || e.target.closest('.cmd-select') || e.target.closest('.comm-input')) return;
        setActivePoint(p, true);
    };
    item.querySelector('.btn-del').onclick = () => { if(confirm("Удалить точку?")) { pushHistorySnapshot(); delPoint(p); pushHistorySnapshot(); updateSaveState(); if(single) toggleM('pointsOrderModal'); else openPointsOrderModal(); showToast("Точка удалена", 'info'); } };
    item.querySelector('.btn-path').onclick = () => { toggleM('pointsOrderModal'); startEditPath(p); };
    return item;
}

function delPoint(p) {
    points = points.filter(x => x !== p);
    map.geoObjects.remove(p.pm);
    map.geoObjects.remove(p.line);
    if(p.pmEnd) map.geoObjects.remove(p.pmEnd);
    if (activePoint === p) activePoint = null;
    recalculateIds();
    setActivePoint(points[0] || null);
}
function startEditPath(p) {
    cur = p;
    isDrawing = true;
    $('addText').textContent = "Завершить рисование пути";
    $('addMarkerBtn').classList.add('drawing');
    p.pm.options.set('draggable', true);
    p.line.editor.startEditing();
    setActivePoint(p, true);
}

function openPointsOrderModal() {
    modalMode = 'list'; const list = $('pointsSortList'); list.innerHTML = ''; $('orderModalTitle').textContent = curRoute || "Маршрут"; $('saveInListBtn').style.display = 'none';
    if (!points.length) list.innerHTML = '<div style="text-align:center;padding:40px;color:#c7c9d1;font-weight:500;">Маршрут пока пуст</div>'; else points.forEach(p => list.appendChild(createPointCard(p)));
    syncActiveListCard();
    toggleM('pointsOrderModal');
}

function openEditPointModal(p) { modalMode = 'edit'; $('pointsSortList').innerHTML = ''; $('orderModalTitle').textContent = `Точка #${p.id}`; $('saveInListBtn').style.display = 'block'; $('saveBtnText').textContent = "Готово"; $('pointsSortList').appendChild(createPointCard(p, true)); syncActiveListCard(); toggleM('pointsOrderModal'); }
function openCreatePointModal() {
    modalMode = 'create';
    $('pointsSortList').innerHTML = '';
    $('orderModalTitle').textContent = "Новая точка";
    $('saveInListBtn').style.display = 'block';
    $('saveBtnText').textContent = "Поставить на карту";
    tempNewPointData = { id: points.length + 1, color: 'Gold', cmd: COMMAND_SETS.Gold[0], comm: '' };
    $('pointsSortList').appendChild(createPointCard(tempNewPointData, true));
    toggleM('pointsOrderModal');
}

function handleModalSave() {
    if (modalMode === 'list') saveGist();
    else if (modalMode === 'edit') toggleM('pointsOrderModal');
    else if (modalMode === 'create') {
        toggleM('pointsOrderModal');
        isAdd = true;
        $('addMarkerBtn').classList.add('active');
        $('addText').textContent = "Выберите место на карте";
        map.setCursor('crosshair');
    }
}

function reorderPointsFromList() {
    pushHistorySnapshot();
    points = Array.from($('pointsSortList').children).map(c => points.find(p => p.id === parseInt(c.dataset.id))).filter(p => !!p);
    recalculateIds();
    pushHistorySnapshot();
    updateSaveState();
}
async function saveGist() {
    if(!curRoute) return;
    const btn = $('saveInListBtn');
    const topSaveBtn = $('saveStateBtn');
    btn.classList.add('loading');
    if (topSaveBtn) { topSaveBtn.disabled = true; topSaveBtn.textContent = 'Сохраняем...'; }
    try {
        const data = points.map(p => ({ id: p.id, color: p.color, pts: p.pts, cmd: p.cmd, comm: p.comm }));
        const result = await callYcFunction('save', { m: curRoute }, data);
        if(result && !result.error) {
            lastSavedSnapshot = serializePoints();
            btn.classList.remove('loading');
            btn.classList.add('saved');
            if (topSaveBtn) topSaveBtn.textContent = 'Сохранено';
            setTimeout(() => {
                btn.classList.remove('saved');
                if (modalMode === 'list') toggleM('pointsOrderModal');
                updateSaveState();
            }, 900);
        } else {
            btn.classList.remove('loading');
            if (topSaveBtn) { topSaveBtn.disabled = false; topSaveBtn.textContent = 'Ошибка, повторить'; }
            showToast(result?.error || 'Ошибка сохранения', 'error');
        }
    } catch(e) {
        btn.classList.remove('loading');
        if (topSaveBtn) { topSaveBtn.disabled = false; topSaveBtn.textContent = 'Ошибка, повторить'; }
        showToast('Ошибка: ' + e.message, 'error');
    }
}

// Экспорт функций в глобальную область для onclick обработчиков
window.openPointsOrderModal = openPointsOrderModal;
window.openSettingsModal = openSettingsModal;
window.toggleGpsMode = toggleGpsMode;
window.toggleLayer = toggleLayer;
window.handleAddBtnClick = handleAddBtnClick;
window.saveGist = saveGist;
window.closeD = closeD;
window.toggleM = toggleM;
window.handleModalSave = handleModalSave;
window.renameActiveRoute = renameActiveRoute;
window.shareActiveRoute = shareActiveRoute;
window.deleteActiveRoute = deleteActiveRoute;
window.launchNavigatorWithCurrentRoute = launchNavigatorWithCurrentRoute;
window.handleCreateNew = handleCreateNew;
</script>
</body>
</html>
